sonar.organization=aarohifulloflife-cloud
sonar.projectKey=aarohifulloflife-cloud_taskmanager
sonar.projectName=Task Manager DevOps Pipeline
sonar.projectVersion=1.0

sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=tests/**/*.test.js

# Exclude front-end static assets and the server bootstrap from coverage
sonar.exclusions=public/**,src/server.js

# Coverage report produced by Jest (lcov)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8